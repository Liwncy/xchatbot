<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>人机验证</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; margin: 24px; color: #1f2937; }
.card { max-width: 560px; margin: 0 auto; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; }
h1 { font-size: 20px; margin-top: 0; }
button { margin-top: 14px; padding: 10px 16px; border: 0; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; font-size: 15px; }
button:disabled { background: #93c5fd; cursor: not-allowed; }
.tip { color: #6b7280; font-size: 14px; }
.section { margin-top: 16px; padding-top: 12px; border-top: 1px dashed #e5e7eb; }
.section h2 { font-size: 15px; margin: 0 0 8px; }
.section p, .section li { font-size: 14px; line-height: 1.65; }
ul { margin: 8px 0 0 18px; padding: 0; }
a { color: #2563eb; text-decoration: none; }
a:hover { text-decoration: underline; }
#result { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; font-size: 14px; }
#result.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
#result.fail { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
#error-banner { margin-bottom: 12px; padding: 10px 12px; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; border-radius: 8px; font-size: 14px; display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>你是人类吗？🧐</h1>
  <div id="error-banner"></div>
  <p class="tip">会话ID: <code id="session-id-display">加载中…</code></p>
  <form id="verify-form">
    <div class="cf-turnstile" data-sitekey="0x4AAAAAADSBErUgKOZeHOX3" data-callback="onTurnstileSuccess" data-error-callback="onTurnstileError"></div>
    <button type="submit" id="submit-btn" disabled>我是人类，提交！</button>
  </form>
  <p class="tip">验证完成后，认证结果会发到微信通知你。</p>
  <div id="result"></div>

  <div class="section">
    <h2>这是在干嘛？</h2>
    <p style="font-size:14px;line-height:1.7">就是想知道你是不是人类 🤖<br>没有别的目的，纯娱乐。</p>
  </div>
</div>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script>
  // ── 配置 ──────────────────────────────────────────────
  var WORKER_VERIFY_API = 'https://xbot.lwcfworker.dpdns.org/turnstile/api/verify';
  // ─────────────────────────────────────────────────────

  var turnstileToken = null;
  var sessionId = new URLSearchParams(location.search).get('sid') || '';

  document.getElementById('session-id-display').textContent = sessionId || '（缺少 sid 参数）';

  if (!sessionId) {
    showBanner('缺少会话ID（sid 参数），请返回微信重新获取验证链接。');
  }

  function onTurnstileSuccess(token) {
    turnstileToken = token;
    document.getElementById('submit-btn').disabled = false;
  }

  function onTurnstileError() {
    turnstileToken = null;
    document.getElementById('submit-btn').disabled = true;
    showResult(false, 'Turnstile 验证组件加载失败，请刷新页面重试。');
  }

  document.getElementById('verify-form').addEventListener('submit', function(e) {
    e.preventDefault();
    if (!turnstileToken) { showResult(false, '请先完成 Turnstile 验证。'); return; }
    if (!sessionId) { showResult(false, '缺少会话ID，请返回微信重新获取链接。'); return; }

    var btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '提交中…';

    fetch(WORKER_VERIFY_API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token: turnstileToken, sessionId: sessionId}),
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        showResult(true, '🎉 恭喜，经权威认证您是人类！结果已上报微信，欢迎继续做人～');
        document.getElementById('verify-form').style.display = 'none';
      } else {
        showResult(false, '❌ ' + (data.error || '验证未通过，请重试。'));
        btn.disabled = false;
        btn.textContent = '提交验证';
      }
    })
    .catch(function(err) {
      showResult(false, '网络错误，请检查连接后重试：' + err.message);
      btn.disabled = false;
      btn.textContent = '提交验证';
    });
  });

  function showResult(success, message) {
    var el = document.getElementById('result');
    el.style.display = 'block';
    el.className = success ? 'success' : 'fail';
    el.textContent = message;
  }

  function showBanner(message) {
    var el = document.getElementById('error-banner');
    el.style.display = 'block';
    el.textContent = message;
  }
</script>
</body>
</html>
