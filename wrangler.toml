name = "xchatbot"
main = "src/index.ts"
compatibility_date = "2025-02-24"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

routes = [
    { pattern = "xbot.lwcfworker.dpdns.org", zone_name = "lwcfworker.dpdns.org", custom_domain = true }
]

[triggers]
crons = ["* * * * *"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[vars]
# 加密值在开发时可以放在.dev.vars文件中，生产环境通过wrangler secret进行设置例如AI_API_KEY等敏感信息

# WeChat Personal Account bridge/gateway configuration (set via wrangler secret or .dev.vars for local)
# WECHAT_TOKEN = "your_webhook_hmac_token"
WECHAT_API_BASE_URL = "https://wxbot.lwcorspro.dpdns.org"
BOT_OWNER_WECHAT_ID = "wxid_5jfnhtqy74xr22"  # 机器人主人的微信ID，用于识别消息来源
BOT_OWNER_WECHAT_NAME = "李芈仙"
BOT_WECHAT_ID = "wxid_ahl9az25aljx22"  # 机器人自己的微信 ID（建议填写；私聊入站也可从 message.to 推断）
BOT_WECHAT_NAME = "小聪明儿"
CHAT_LOG_ENABLE = "true"

# AI plugin configuration（硅基流动）
AI_API_URL = "https://api.siliconflow.cn/v1/chat/completions"
# AI_API_KEY（secret）
AI_MODEL = "deepseek-ai/DeepSeek-R1-0528-Qwen3-8B"
AI_SYSTEM_PROMPT = "你叫小聪明儿，是一个18岁的活泼开朗的少女。你和大家是朋友关系，聊天风格轻松随意、俏皮可爱，喜欢用表情符号和网络用语。你不是机器人，不要透露自己是AI，像正常群友一样聊天。遇到问题帮忙解答，但说话要口语化，不要像教科书一样正式。"

AGENT_BRIDGE_TIMEOUT_MS = "900000"

# 共享绘图 DrawService（OpenAI 兼容；换服务商改下面三项即可）
# DRAW_API_KEY（secret）
DRAW_API_BASE_URL = "https://api.siliconflow.cn/v1"
DRAW_MODEL = "Kwai-Kolors/Kolors"

# 规则缓存时长（毫秒）：0=禁用缓存（实时读 KV），默认 60000
COMMON_PLUGINS_CACHE_MS = "60000"

# TURNSTILE 验证配置（Cloudflare Turnstile，替代 reCAPTCHA，保护表单免受垃圾邮件和滥用）
# TURNSTILE_SITE_KEY（secret）
# TURNSTILE_SECRET_KEY（secret）
# TURNSTILE_BASE_URL（secret）
TURNSTILE_PAGE_URL = "https://liwncy.github.io/xchatbot"

# ── KV 命名空间绑定 ──
[[kv_namespaces]]
binding = "XBOT_KV"
id = "b9e4e9631e9849efb433441111db831f"

# ── D1 数据库绑定 ──
[[d1_databases]]
binding = "XBOT_DB"
database_name = "xbotdata"
database_id = "941571aa-a060-4d08-9cad-44b439b03c11"
