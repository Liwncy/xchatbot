name = "xchatbot"
main = "src/index.ts"
compatibility_date = "2025-02-24"
workers_dev = true
preview_urls = true

routes = [
    { pattern = "liwncy.us.ci", zone_name = "liwncy.us.ci", custom_domain = true }
]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[vars]
# 加密值在开发时可以放在.dev.vars文件中，生产环境通过wrangler secret进行设置例如AI_API_KEY等敏感信息
DEBUG_FORWARD_ENABLED = "false"  # 是否启用调试转发功能（仅在开发环境使用）
DEBUG_FORWARD_URL = "https://xbot.lwccorpbox.us.ci"

# WeChat Personal Account bridge/gateway configuration (set via wrangler secret or .dev.vars for local)
# WECHAT_TOKEN = "your_webhook_hmac_token"
WECHAT_API_BASE_URL = "https://wxbot.lwcgolem.us.ci"
BOT_OWNER_WECHAT_ID = "your_wechat_id"  # 机器人主人的微信ID，用于识别消息来源

# AI plugin configuration
AI_API_URL = "https://api.moonshot.cn/v1/chat/completions"
# AI_API_KEY（secret）
AI_MODEL = "moonshot-v1-8k"
AI_SYSTEM_PROMPT = "你叫小聪明儿，是一个智能的AI助手，专门帮助用户解答问题和提供信息。请尽量简洁明了地回答用户的问题，并且保持友好和专业的态度。"

# 通用插件配置（远程拉取）
COMMON_PLUGINS_CONFIG_URL = "https://m1.apifoxmock.com/m1/7883103-7633002-default/common/plugins/config"
COMMON_PLUGINS_CLIENT_ID = "6e64c2eeb9c6716965a67a6f8d3879e0"
