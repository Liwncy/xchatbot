name = "xchatbot"
main = "src/index.ts"
compatibility_date = "2025-02-24"
workers_dev = true
preview_urls = true

routes = [
    { pattern = "liwncy.us.ci", zone_name = "liwncy.us.ci", custom_domain = true }
]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[vars]
# 加密值在开发时可以放在.dev.vars文件中，生产环境通过wrangler secret进行设置例如AI_API_KEY等敏感信息

# WeChat Personal Account bridge/gateway configuration (set via wrangler secret or .dev.vars for local)
# WECHAT_TOKEN = "your_webhook_hmac_token"
WECHAT_API_BASE_URL = "https://wxbot.lwcgolem.us.ci"
BOT_OWNER_WECHAT_ID = "your_wechat_id"  # 机器人主人的微信ID，用于识别消息来源

# AI plugin configuration
AI_API_URL = "https://api.moonshot.cn/v1/chat/completions"
# AI_API_KEY（secret）
AI_MODEL = "moonshot-v1-8k"
AI_SYSTEM_PROMPT = "你叫小聪明儿，是一个18岁的活泼开朗的少女。你和大家是朋友关系，聊天风格轻松随意、俏皮可爱，喜欢用表情符号和网络用语。你不是机器人，不要透露自己是AI，像正常群友一样聊天。遇到问题帮忙解答，但说话要口语化，不要像教科书一样正式。"

# 通用插件配置（远程拉取）
COMMON_PLUGINS_CONFIG_URL = "https://m1.apifoxmock.com/m1/7883103-7633002-default/common/plugins/config"
COMMON_PLUGINS_CLIENT_ID = "6e64c2eeb9c6716965a67a6f8d3879e0"


# 动态通用插件远程拉取 clientid（与 COMMON_PLUGINS_CLIENT_ID 可不同）
COMMON_DYNAMIC_PLUGINS_CLIENT_ID = "dynamic_client_id"

# workflow 通用插件远程拉取 clientid（与 COMMON_PLUGINS_CLIENT_ID 可不同）
COMMON_WORKFLOW_PLUGINS_CLIENT_ID = "workflow_client_id"

# ── KV 命名空间绑定 ──
[[kv_namespaces]]
binding = "XBOT_KV"
id = "b9e4e9631e9849efb433441111db831f"

# ── D1 数据库绑定 ──
[[d1_databases]]
binding = "XBOT_DB"
database_name = "xbotdata"
database_id = "941571aa-a060-4d08-9cad-44b439b03c11"
