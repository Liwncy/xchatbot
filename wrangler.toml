name = "xchatbot"
main = "src/index.ts"
compatibility_date = "2025-02-24"

[vars]
# 加密值在开发时可以放在.dev.vars文件中，生产环境通过wrangler secret进行设置例如AI_API_KEY等敏感信息

# WeChat Personal Account bridge/gateway configuration (set via wrangler secret or .dev.vars for local)
# WECHAT_TOKEN = "your_webhook_hmac_token"
# WECHAT_CALLBACK_URL = "http://your-bridge-gateway/callback"
WECHAT_API_BASE_URL = "http://127.0.0.1:7080"
BOT_OWNER_WECHAT_ID = "your_wechat_id"  # 机器人主人的微信ID，用于识别消息来源
# 视频发送参数（示例）
# 1x1 PNG (transparent) base64
WECHAT_VIDEO_THUMB_BASE64 = "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO5W0YQAAAAASUVORK5CYII="
WECHAT_VIDEO_DURATION = "12"

# AI plugin configuration
AI_API_URL = "https://api.moonshot.cn/v1/chat/completions"
# AI_API_KEY（secret）
AI_MODEL = "moonshot-v1-8k"
AI_SYSTEM_PROMPT = "你叫小聪明儿，是一个智能的AI助手，专门帮助用户解答问题和提供信息。请尽量简洁明了地回答用户的问题，并且保持友好和专业的态度。"

